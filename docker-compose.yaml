networks :
# the Presence of these objects is sufficient ot define them
#Network name
  expense: {}
  # Volume and Volume Name
volumes:
  mysql:
services:
# Docker run -f --name mysql --network Expense -v mysql/lib/mysql mysql
#1. Mysql Container
  mysql:
  # its pull the build every time when we need
    build: ./mysql
    networks:
     - expense
    volumes:
      - mysql:/var/lib/mysql  
    container_name: mysql  
#2.Backend Container
  backend:
    build: ./backend
    command: sh -c "sleep 30 && node /opt/backend/index.js"
    networks:
      - expense
    container_name: backend
    depends_on:
      - mysql 
#3.Frotend Container
  frontend:
     build: ./frontend
     networks:
      - expense
     container_name: frontend
     ports: 
      - "80:80"
     depends_on:
      - backend     
     



